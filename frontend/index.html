<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioKB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Tiptap + extensions via esm.sh — bundled via importmap -->
  <script type="importmap">
  {
    "imports": {
      "@tiptap/core": "https://esm.sh/@tiptap/core@2.4.0",
      "@tiptap/pm/state": "https://esm.sh/@tiptap/pm@2.4.0/state",
      "@tiptap/pm/view": "https://esm.sh/@tiptap/pm@2.4.0/view",
      "@tiptap/pm/model": "https://esm.sh/@tiptap/pm@2.4.0/model",
      "@tiptap/pm/transform": "https://esm.sh/@tiptap/pm@2.4.0/transform",
      "@tiptap/extension-document": "https://esm.sh/@tiptap/extension-document@2.4.0",
      "@tiptap/extension-paragraph": "https://esm.sh/@tiptap/extension-paragraph@2.4.0",
      "@tiptap/extension-text": "https://esm.sh/@tiptap/extension-text@2.4.0",
      "@tiptap/extension-bold": "https://esm.sh/@tiptap/extension-bold@2.4.0",
      "@tiptap/extension-italic": "https://esm.sh/@tiptap/extension-italic@2.4.0",
      "@tiptap/extension-underline": "https://esm.sh/@tiptap/extension-underline@2.4.0",
      "@tiptap/extension-strike": "https://esm.sh/@tiptap/extension-strike@2.4.0",
      "@tiptap/extension-heading": "https://esm.sh/@tiptap/extension-heading@2.4.0",
      "@tiptap/extension-bullet-list": "https://esm.sh/@tiptap/extension-bullet-list@2.4.0",
      "@tiptap/extension-ordered-list": "https://esm.sh/@tiptap/extension-ordered-list@2.4.0",
      "@tiptap/extension-list-item": "https://esm.sh/@tiptap/extension-list-item@2.4.0",
      "@tiptap/extension-blockquote": "https://esm.sh/@tiptap/extension-blockquote@2.4.0",
      "@tiptap/extension-code-block": "https://esm.sh/@tiptap/extension-code-block@2.4.0",
      "@tiptap/extension-horizontal-rule": "https://esm.sh/@tiptap/extension-horizontal-rule@2.4.0",
      "@tiptap/extension-image": "https://esm.sh/@tiptap/extension-image@2.4.0",
      "@tiptap/extension-link": "https://esm.sh/@tiptap/extension-link@2.4.0",
      "@tiptap/extension-text-align": "https://esm.sh/@tiptap/extension-text-align@2.4.0",
      "@tiptap/extension-color": "https://esm.sh/@tiptap/extension-color@2.4.0",
      "@tiptap/extension-text-style": "https://esm.sh/@tiptap/extension-text-style@2.4.0",
      "@tiptap/extension-placeholder": "https://esm.sh/@tiptap/extension-placeholder@2.4.0",
      "@tiptap/extension-history": "https://esm.sh/@tiptap/extension-history@2.4.0"
    }
  }
  </script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#2563eb"/>
        <path d="M18 8 L18 28 M8 18 L28 18" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M12 12 Q18 6 24 12 Q30 18 24 24 Q18 30 12 24 Q6 18 12 12Z" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
      </svg>
    </div>
    <h1>CardioKB</h1>
    <p class="login-subtitle">Your cardiology knowledge base</p>
    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <div id="login-error" class="error-msg" hidden></div>
      <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app" hidden>

  <!-- Sidebar / breadcrumb nav -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-logo">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="#2563eb"/>
          <path d="M18 8 L18 28 M8 18 L28 18" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M12 12 Q18 6 24 12 Q30 18 24 24 Q18 30 12 24 Q6 18 12 12Z" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
        </svg>
        <span class="app-title">CardioKB</span>
      </div>
      <button class="btn-icon" id="logout-btn" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <!-- Breadcrumb trail -->
    <nav class="breadcrumb-nav" id="breadcrumb-nav">
      <button class="breadcrumb-item active" data-id="">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
    </nav>

    <!-- Children list in sidebar -->
    <div class="sidebar-children" id="sidebar-children"></div>
  </aside>

  <!-- Main content area -->
  <main class="main-content">
    <div class="content-header">
      <div id="current-title-area">
        <h2 id="current-title">Home</h2>
        <p id="current-subtitle" class="subtitle"></p>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn btn-primary" id="add-category-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Category
        </button>
      </div>
    </div>

    <!-- Grid of categories / subcategories -->
    <div class="node-grid" id="node-grid"></div>

    <!-- Fragment list (text blocks) -->
    <div class="fragment-list" id="fragment-list"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Category</h3>
      <button class="btn-icon" id="modal-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- Injected dynamically -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Save</button>
    </div>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
